let current = 0;
let correctCount = 0;
let attemptCount = 0;

function chip(text) {
  const span = document.createElement('span');
  span.textContent = text;
  span.className = 'chip';
  return span;
}

function showSearchStage() {
  const c = cases[current];
  document.getElementById('q-pill').textContent = '사건 ' + (current + 1) + ' / ' + cases.length;
  document.getElementById('stage-search').style.display = 'block';
  document.getElementById('stage-words').style.display = 'none';

  document.getElementById('case-icon').textContent = c.icon;

  const preview = document.getElementById('sentence-preview');
  preview.innerHTML = '';
  c.parts.forEach(function(p) {
    preview.appendChild(chip(p.t));
  });

  const link = document.getElementById('search-link');
  link.href = 'https://search.naver.com/search.naver?query=' + encodeURIComponent(c.query);
}

function showWordsStage() {
  document.getElementById('stage-search').style.display = 'none';
  document.getElementById('stage-words').style.display = 'block';

  const c = cases[current];
  const row = document.getElementById('sentence-row');
  row.innerHTML = '';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('word-hint').textContent = '거짓이라고 생각하는 단어 하나를 클릭하세요.';

  c.parts.forEach(function(part, idx) {
    const word = chip(part.t);
    word.classList.add('clickable');
    word.onclick = function() { handlePick(idx, part); };
    row.appendChild(word);
  });
}

function handlePick(idx, part) {
  attemptCount++;
  document.getElementById('score-attempts').textContent = attemptCount;

  const feedback = document.getElementById('feedback-box');
  const words = document.querySelectorAll('#sentence-row .chip');

  if (!part.r) {
    correctCount++;
    document.getElementById('score-correct').textContent = correctCount;

    words[idx].classList.add('correct');

    feedback.innerHTML = '';
    const ok = document.createElement('div');
    ok.className = 'feedback-box ok';
    ok.innerHTML = '<i class="ti ti-circle-check"></i><div><div class="feedback-title">정답입니다</div><div class="feedback-detail">' + (part.note || '') + '</div></div>';
    feedback.appendChild(ok);

    words.forEach(function(w) { w.onclick = null; w.style.cursor = 'default'; });

    setTimeout(function() {
      current++;
      if (current < cases.length) {
        showSearchStage();
      } else {
        document.getElementById('stage-words').style.display = 'none';
        document.getElementById('final-banner').style.display = 'block';
        document.getElementById('final-score').textContent = '총 시도 ' + attemptCount + '회 만에 20개 사건을 모두 해결했어요 — ' + (attemptCount <= 24 ? '거의 모든 사건을 단번에 해결했어요!' : attemptCount <= 32 ? '꾸준한 검증 습관이 돋보여요.' : '검증은 끝까지 포기하지 않는 게 중요해요.');
      }
    }, 1600);
  } else {
    words[idx].classList.add('wrong');

    feedback.innerHTML = '';
    const wrong = document.createElement('div');
    wrong.className = 'feedback-box bad';
    wrong.innerHTML = '<i class="ti ti-circle-x"></i><div><div class="feedback-title">오답입니다</div><div class="feedback-detail">이 단어는 사실입니다. 다시 검색해서 그럴듯하게 숨은 거짓 단어를 찾아보세요.</div></div>';
    feedback.appendChild(wrong);

    words.forEach(function(w) { w.onclick = null; w.style.cursor = 'default'; });

    setTimeout(function() {
      showSearchStage();
    }, 1600);
  }
}

document.getElementById('to-words-btn').onclick = showWordsStage;

showSearchStage();
</script>

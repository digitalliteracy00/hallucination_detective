let current = 0;
let correctCount = 0;
let attemptCount = 0;

function chip(text) {
  const span = document.createElement('span');
  span.textContent = text;
  span.style.cssText = 'font-size:15px; font-weight:500; padding:6px 14px; border-radius:999px; border:0.5px solid var(--border-strong); background:var(--surface-1); color:var(--text-primary); display:inline-block;';
  return span;
}

function showSearchStage() {
  const c = cases[current];
  document.getElementById('q-pill').textContent = '사건 ' + (current + 1) + ' / ' + cases.length;
  document.getElementById('stage-search').style.display = 'block';
  document.getElementById('stage-words').style.display = 'none';

  document.getElementById('case-icon').innerHTML = '<i class="ti ' + c.icon + '" aria-hidden="true" style="font-size:26px; color:var(--text-accent);"></i>';

  const preview = document.getElementById('sentence-preview');
  preview.innerHTML = '';
  c.parts.forEach(function(p) {
    const span = chip(p.t);
    span.style.cursor = 'default';
    preview.appendChild(span);
  });

  const link = document.getElementById('search-link');
  link.href = 'https://search.naver.com/search.naver?query=' + encodeURIComponent(c.query);
}

function showWordsStage() {
  document.getElementById('stage-search').style.display = 'none';
  document.getElementById('stage-words').style.display = 'block';

  const c = cases[current];
  const row = document.getElementById('sentence-row');
  row.innerHTML = '';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('word-hint').textContent = '거짓이라고 생각하는 단어 하나를 클릭하세요.';
  document.getElementById('word-hint').style.color = 'var(--text-muted)';

  c.parts.forEach(function(part, idx) {
    const word = chip(part.t);
    word.style.cursor = 'pointer';
    word.onclick = function() { handlePick(idx, part); };
    row.appendChild(word);
  });
}

function handlePick(idx, part) {
  attemptCount++;
  document.getElementById('score-attempts').textContent = attemptCount;

  const feedback = document.getElementById('feedback-box');

  if (!part.r) {
    correctCount++;
    document.getElementById('score-correct').textContent = correctCount;

    const words = document.querySelectorAll('#sentence-row span');
    words[idx].style.background = 'var(--bg-success)';
    words[idx].style.borderColor = 'var(--border-success)';
    words[idx].style.color = 'var(--text-success)';

    feedback.innerHTML = '';
    const ok = document.createElement('div');
    ok.style.cssText = 'margin-top:14px; padding:12px 14px; border-radius:var(--radius); font-size:14px; background:var(--bg-success); color:var(--text-success); display:flex; gap:10px; align-items:flex-start;';
    ok.innerHTML = '<i class="ti ti-circle-check" aria-hidden="true" style="font-size:18px; flex-shrink:0; margin-top:1px;"></i><div><div style="font-weight:500; margin-bottom:4px;">정답입니다</div><div style="font-size:13px; color:var(--text-secondary); font-weight:400;">' + (part.note || '') + '</div></div>';
    feedback.appendChild(ok);

    document.querySelectorAll('#sentence-row span').forEach(function(w) { w.onclick = null; w.style.cursor = 'default'; });

    setTimeout(function() {
      current++;
      if (current < cases.length) {
        showSearchStage();
      } else {
        document.getElementById('stage-words').style.display = 'none';
        document.getElementById('final-banner').style.display = 'block';
        document.getElementById('final-score').textContent = '총 시도 ' + attemptCount + '회 만에 20개 사건을 모두 해결했어요 — ' + (attemptCount <= 24 ? '거의 모든 사건을 단번에 해결했어요!' : attemptCount <= 32 ? '꾸준한 검증 습관이 돋보여요.' : '검증은 끝까지 포기하지 않는 게 중요해요.');
      }
    }, 1600);
  } else {
    const words = document.querySelectorAll('#sentence-row span');
    words[idx].style.background = 'var(--bg-danger)';
    words[idx].style.borderColor = 'var(--border-danger)';
    words[idx].style.color = 'var(--text-danger)';

    feedback.innerHTML = '';
    const wrong = document.createElement('div');
    wrong.style.cssText = 'margin-top:14px; padding:12px 14px; border-radius:var(--radius); font-size:14px; background:var(--bg-danger); color:var(--text-danger); display:flex; gap:10px; align-items:flex-start;';
    wrong.innerHTML = '<i class="ti ti-circle-x" aria-hidden="true" style="font-size:18px; flex-shrink:0; margin-top:1px;"></i><div><div style="font-weight:500; margin-bottom:4px;">오답입니다</div><div style="font-size:13px; color:var(--text-secondary); font-weight:400;">이 단어는 사실입니다. 다시 검색해서 그럴듯하게 숨은 거짓 단어를 찾아보세요.</div></div>';
    feedback.appendChild(wrong);

    document.querySelectorAll('#sentence-row span').forEach(function(w) { w.onclick = null; w.style.cursor = 'default'; });

    setTimeout(function() {
      showSearchStage();
    }, 1600);
  }
}

document.getElementById('to-words-btn').onclick = showWordsStage;

showSearchStage();
</script>
